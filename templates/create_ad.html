<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إنشاء إعلان</title>
</head>

<body>

<h1>إنشاء إعلان USDT</h1>

<form method="POST">

    <label>نوع الإعلان</label><br>

    <select name="type">
        <option value="SELL">بيع USDT</option>
        <option value="BUY">شراء USDT</option>
    </select>

    <br><br>


    <label>الكمية USDT</label><br>
    <input type="number" name="amount" required>

    <br><br>


    <label>السعر بالشيكل</label><br>
    <input type="number" step="0.01" name="price" required>

    <br><br>


    <label>طريقة الدفع</label><br>
    <input type="text" name="payment" placeholder="مثال: بنك فلسطين">

    <br><br>


    <button type="submit">
        نشر الإعلان
    </button>

</form>


<br>

<a href="/">
العودة للرئيسية
</a>


</body>
</html>
