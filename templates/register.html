<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<title>إنشاء حساب</title>

<style>

body {
    font-family: Arial;
    background:#f5f5f5;
    padding:20px;
}

.box {
    background:white;
    padding:20px;
    border-radius:10px;
    max-width:400px;
}

input {
    width:100%;
    padding:10px;
    margin:10px 0;
}

button {
    width:100%;
    padding:12px;
    background:green;
    color:white;
    border:none;
    border-radius:5px;
}

</style>

</head>


<body>


<h1>
👤 إنشاء حساب جديد
</h1>


<div class="box">


<form method="POST">


<label>
اسم المستخدم
</label>

<input
type="text"
name="username"
required>


<label>
البريد الإلكتروني
</label>

<input
type="email"
name="email"
required>


<label>
كلمة المرور
</label>

<input
type="password"
name="password"
required>


<button type="submit">
إنشاء الحساب
</button>


</form>


<br>


<a href="/login">
لدي حساب بالفعل
</a>


</div>


</body>

</html>
